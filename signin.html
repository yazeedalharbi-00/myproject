<!DOCTYPE html>
<html>

<head>
  <title>Sign In - Yazeed Alharbi CV</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #e7e7e7;
    }

    .auth-box {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      border: 2px solid #870c0e;
    }

    .auth-box h1 {
      text-align: center;
      color: #870c0e;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #252525;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #870c0e;
      box-shadow: 0 0 5px rgba(135, 12, 14, 0.3);
    }

    .submit-btn {
      width: 100%;
      padding: 0.75rem;
      background: #870c0e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
    }

    .submit-btn:hover {
      background: #a01821;
    }

    .form-footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .form-footer a {
      color: #870c0e;
      text-decoration: none;
      font-weight: 600;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    .message {
      padding: 0.75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      text-align: center;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .demo {
      background: #e8f4f8;
      padding: 1rem;
      border-radius: 4px;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #333;
    }

    .demo strong {
      color: #870c0e;
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>Sign In</h1>
      <div id="message"></div>
      <form id="signinForm">
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="submit-btn">Sign In</button>
      </form>
      <div class="form-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
      <div class="demo">
        <strong>Demo Account:</strong><br>
        Email: admin@demo.com<br>
        Password: admin123
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Create a demo admin account on first load
    window.addEventListener('load', function () {
      const users = getUsers();
      if (users.length === 0) {
        const demoAdmin = {
          id: Date.now(),
          name: 'Admin',
          email: 'admin@demo.com',
          password: 'admin123',
          isAdmin: true,
          createdAt: new Date().toISOString()
        };
        users.push(demoAdmin);
        saveUsers(users);
      }
    });

    document.getElementById('signinForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');

      const result = signin(email, password);
      if (result.success) {
        messageDiv.className = 'message success';
        messageDiv.textContent = 'Sign in successful';
        setTimeout(() => {
          window.location.href = result.user.isAdmin ? 'admin.html' : 'index.html';
        }, 1000);
      } else {
        messageDiv.className = 'message error';
        messageDiv.textContent = result.message;
      }

      this.reset();
    });
  </script>
</body>

</html>
